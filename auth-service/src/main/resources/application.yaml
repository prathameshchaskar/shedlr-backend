spring:
  application:
    name: auth-service
  
  # Mail Configuration
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Database Configuration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      pool-name: ShedlrHikariPool

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  # Flyway Migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Management & Monitoring
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# Custom Application Properties
application:
  mail:
    from: ${MAIL_FROM}
    verification-url: ${FRONTEND_BASE_URL}/verify-email
    password-reset-url: ${FRONTEND_BASE_URL}/reset-password
  
  security:
    cors:
      allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
      refresh-token:
        expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
    lockout:
      max-attempts: ${LOCKOUT_MAX_ATTEMPTS:5}
      duration-minutes: ${LOCKOUT_DURATION:15}

  rate-limit:
    login:
      capacity: ${RATE_LIMIT_LOGIN_CAPACITY:5}
      period: ${RATE_LIMIT_LOGIN_PERIOD:1m}
    signup:
      capacity: ${RATE_LIMIT_SIGNUP_CAPACITY:3}
      period: ${RATE_LIMIT_SIGNUP_PERIOD:1h}
    resend-verification:
      capacity: ${RATE_LIMIT_RESEND_CAPACITY:3}
      period: ${RATE_LIMIT_RESEND_PERIOD:1h}
    update-pending-email:
      capacity: ${RATE_LIMIT_UPDATE_PENDING_CAPACITY:3}
      period: ${RATE_LIMIT_UPDATE_PENDING_PERIOD:1h}
