spring:
  application:
    name: auth-service
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:tutorai.dev@gmail.com}
    password: ${MAIL_PASSWORD:razf vqdq htiz tcum}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    # JDBC URL for the PostgreSQL database. 'localhost' is used for local dev outside Docker.
    url: jdbc:postgresql://localhost:5432/shedlr_auth
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
      pool-name: ShedlrHikariPool
  jpa:
    hibernate:
      # Set to 'none' because Flyway handles schema migrations.
      # This prevents Hibernate from validating the schema before Flyway runs.
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    # Added schemas to ensure it target the right one
    schemas: public
    # Force Flyway to log everything
    table: flyway_schema_history
  data:
    redis:
      # Connection settings for Redis used by Bucket4j and Spring Data Redis
      host: localhost
      port: 6379

management:
  tracing:
    sampling:
      # Sample 100% of requests for tracing (reduce in production)
      probability: 1.0
  zipkin:
    tracing:
      # Endpoint for sending trace spans to the Zipkin container
      endpoint: http://localhost:9411/api/v2/spans

application:
  mail:
    from: ${MAIL_FROM:tutorai.dev@gmail.com}
    verification-url: ${VERIFICATION_URL:http://localhost:4200/verify-email}
    password-reset-url: ${PASSWORD_RESET_URL:http://localhost:4200/reset-password}
  security:
    cors:
      # The URL of the frontend Angular application.
      # Used to configure CORS (Cross-Origin Resource Sharing) securely.
      allowed-origins: http://localhost:4200
    jwt:
      # Use a base64 encoded string of at least 256 bits for production
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 3600000 # 1 hour
      refresh-token:
        expiration: 604800000 # 7 days
